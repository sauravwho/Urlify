<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urlify - URL Shortener</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            background-color: var(--card-bg);
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        input[type="url"] {
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="url"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            padding: 0.75rem 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        #result {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 0.5rem;
            background-color: #f3f4f6;
            display: none;
        }

        .result-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .short-url-box {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #shortUrlLink {
            font-weight: 600;
            color: var(--primary-color);
            text-decoration: none;
            word-break: break-all;
        }

        #error {
            margin-top: 1rem;
            color: #dc2626;
            font-size: 0.875rem;
            display: none;
        }

        .loader {
            display: none;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Urlify</h1>
        <p class="subtitle">Enter a long URL to make it tiny.</p>

        <form id="shortenForm">
            <div class="input-group">
                <input type="url" id="originalUrl" placeholder="https://example.com/very-long-url" required>
                <button type="submit" id="submitBtn">Shorten URL</button>
            </div>
        </form>

        <div id="loader" class="loader"></div>
        <div id="error"></div>

        <div id="result">
            <div class="result-title">Your shortened URL:</div>
            <div class="short-url-box">
                <a href="#" id="shortUrlLink" target="_blank"></a>
            </div>
            <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 1rem;">
                Tip: Add <code>/api/stats/{code}</code> to the end of the URL to see stats.
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('shortenForm');
        const input = document.getElementById('originalUrl');
        const btn = document.getElementById('submitBtn');
        const result = document.getElementById('result');
        const shortUrlLink = document.getElementById('shortUrlLink');
        const error = document.getElementById('error');
        const loader = document.getElementById('loader');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Reset state
            error.style.display = 'none';
            result.style.display = 'none';
            btn.disabled = true;
            loader.style.display = 'block';

            try {
                const response = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ originalUrl: input.value }),
                });

                const data = await response.json();

                if (response.ok) {
                    shortUrlLink.href = data.shortUrl;
                    shortUrlLink.textContent = data.shortUrl;
                    result.style.display = 'block';
                    input.value = '';
                } else {
                    error.textContent = data.error || data.originalUrl || 'An error occurred. Please try again.';
                    error.style.display = 'block';
                }
            } catch (err) {
                error.textContent = 'Failed to connect to the server.';
                error.style.display = 'block';
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
